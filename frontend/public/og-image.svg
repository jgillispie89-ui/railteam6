<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <rect width="1200" height="5" fill="#BA7517"/>
  <rect y="625" width="1200" height="5" fill="#BA7517"/>

  <!-- Subtle grid lines suggesting a map -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Railroad track decoration -->
  <g opacity="0.12">
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#BA7517" stroke-width="5"/>
    <line x1="0" y1="522" x2="1200" y2="522" stroke="#BA7517" stroke-width="5"/>
    <line x1="60"  y1="492" x2="60"  y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="140" y1="492" x2="140" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="220" y1="492" x2="220" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="300" y1="492" x2="300" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="380" y1="492" x2="380" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="460" y1="492" x2="460" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="540" y1="492" x2="540" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="620" y1="492" x2="620" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="700" y1="492" x2="700" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="780" y1="492" x2="780" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="860" y1="492" x2="860" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="940" y1="492" x2="940" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="1020" y1="492" x2="1020" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="1100" y1="492" x2="1100" y2="530" stroke="#BA7517" stroke-width="4"/>
    <line x1="1180" y1="492" x2="1180" y2="530" stroke="#BA7517" stroke-width="4"/>
  </g>

  <!-- Title -->
  <text x="600" y="240"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="100" font-weight="700" fill="#faf8f3"
        text-anchor="middle" letter-spacing="1">Iron Roads</text>

  <!-- Rust underline -->
  <rect x="340" y="262" width="520" height="3" fill="#BA7517" rx="1.5"/>

  <!-- Subtitle -->
  <text x="600" y="330"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="28" fill="rgba(250,248,243,0.6)"
        text-anchor="middle" letter-spacing="0.5">Kentucky Railroad History Atlas</text>

  <!-- URL -->
  <text x="600" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" fill="rgba(186,117,23,0.7)"
        text-anchor="middle" letter-spacing="1">railteam6.com</text>
</svg>
